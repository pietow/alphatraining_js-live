<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Document</title>
  </head>
  <body>
    <div id="app">
        <img :src="imageUrl" :alt="imageAlt">
        <br />
        <button :disabled="isLoading">Senden</button>
        <button @click="isLoading = !isLoading">Toggle Loading</button>
    </div>

    <script>
        const { createApp, ref } = Vue

        createApp({
            setup() {
                const imageUrl = ref('https://picsum.photos/200')
                const imageAlt = ref('ein zufälliges Bild')
                const isLoading = ref(false)

                return { imageUrl, imageAlt, isLoading}
            }
        }).mount('#app')
    </script>
  </body>
</html>
